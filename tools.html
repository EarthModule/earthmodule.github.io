---
layout: default
title: Tools
---
<h1>Tools</h1>

<ul>
  {% for tool in site.tools %}
    <li>
      <h2><a href="{{ tool.url }}">{{ tool.name }}</a></h2>
      <h3>{{ tool.documentation }}</h3>
      <h3>{{ tool.repository }}</h3>
      <p>{{ tool.content | markdownify }}</p>
    </li>
  {% endfor %}
</ul>
